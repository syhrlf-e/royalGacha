<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gacha THR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full relative z-10 flex flex-col items-center">
      <div class="text-center mb-8 w-full">
        <h1
          class="text-3xl font-extrabold tracking-wider gold-text uppercase mb-2"
        >
          <i class="fa-solid fa-gem mr-2"></i>Gacha THR
        </h1>
        <p class="text-gray-400 text-sm">
          Spin untuk memenangkan hadiah eksklusif
        </p>
      </div>

      <div
        class="slot-machine w-full rounded-2xl p-4 gold-border mb-8 relative"
      >
        <div class="flex gap-3 justify-between">
          <div class="reel-container flex-1 gold-border">
            <div class="strip" id="reel-1"></div>
          </div>
          <div class="reel-container flex-1 gold-border">
            <div class="strip" id="reel-2"></div>
          </div>
          <div class="reel-container flex-1 gold-border">
            <div class="strip" id="reel-3"></div>
          </div>
        </div>
        <div
          class="absolute -top-3 -left-3 w-6 h-6 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"
        ></div>
        <div
          class="absolute -top-3 -right-3 w-6 h-6 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"
        ></div>
        <div
          class="absolute -bottom-3 -left-3 w-6 h-6 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"
        ></div>
        <div
          class="absolute -bottom-3 -right-3 w-6 h-6 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"
        ></div>
      </div>

      <button
        id="spin-btn"
        onclick="startSpin()"
        class="w-full relative group overflow-hidden rounded-full p-[2px] disabled:opacity-50 disabled:cursor-not-allowed transition-all"
      >
        <span
          class="absolute inset-0 bg-gradient-to-r from-yellow-400 via-yellow-600 to-yellow-400 opacity-70 group-hover:opacity-100 animate-pulse"
        ></span>
        <div
          class="relative bg-gray-900 rounded-full px-8 py-4 flex items-center justify-center gap-2"
        >
          <span
            class="text-xl font-bold gold-text tracking-widest uppercase"
            id="spin-text"
            >SPIN SEKARANG</span
          >
        </div>
      </button>

      <p class="text-xs text-gray-500 mt-6 text-center">
        Cocokkan 3 Jackpot untuk hadiah 100K!
      </p>
    </div>

    <div
      id="result-modal"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden flex-col items-center justify-center p-4"
    >
      <div
        class="bg-gray-800 gold-border rounded-2xl w-full max-w-sm p-6 text-center modal-enter shadow-2xl relative overflow-hidden"
      >
        <div id="modal-content"></div>
        <div id="modal-action-btn" class="mt-6"></div>
      </div>
    </div>

    <div
      id="claim-sheet-overlay"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"
      onclick="closeClaimSheet()"
    ></div>

    <div
      id="claim-sheet"
      class="fixed bottom-0 left-0 right-0 bg-gray-900 rounded-t-3xl z-[70] transform translate-y-full transition-transform duration-300 ease-out border-t border-yellow-500/50 p-6 pb-10 shadow-[0_-20px_40px_rgba(0,0,0,0.8)] max-h-[90vh] overflow-y-auto max-w-md mx-auto"
    >
      <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-6"></div>

      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold gold-text">Formulir Pencairan</h3>
        <button
          onclick="closeClaimSheet()"
          class="text-gray-400 hover:text-white text-2xl"
        >
          &times;
        </button>
      </div>

      <div class="space-y-5">
        <div>
          <label
            class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider"
            >Nominal Hadiah</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
            >
              <i class="fa-solid fa-rupiah-sign text-yellow-500"></i>
            </div>
            <input
              type="text"
              id="claim-nominal"
              readonly
              class="w-full bg-gray-800/50 text-yellow-400 font-bold text-lg border border-gray-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none cursor-not-allowed"
            />
          </div>
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider"
            >Nama Lengkap</label
          >
          <input
            type="text"
            id="claim-nama"
            placeholder="Sesuai nama di akun dompet"
            class="w-full bg-gray-800 text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider"
            >Metode Pencairan</label
          >
          <select
            id="claim-ewallet"
            class="w-full bg-gray-800 text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all"
          >
            <option value="" disabled selected>Pilih Dompet Digital</option>
            <option value="GoPay">🟢 GoPay</option>
            <option value="DANA">🔵 DANA</option>
            <option value="OVO">🟣 OVO</option>
            <option value="ShopeePay">🟠 ShopeePay</option>
          </select>
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider"
            >Nomor Akun / HP</label
          >
          <input
            type="tel"
            id="claim-nomor"
            placeholder="Contoh: 08123456789"
            class="w-full bg-gray-800 text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all"
          />
        </div>

        <button
          onclick="processClaim()"
          class="w-full relative group overflow-hidden rounded-xl p-[2px] mt-2 shadow-[0_0_15px_rgba(234,179,8,0.2)] hover:shadow-[0_0_25px_rgba(234,179,8,0.4)] transition-shadow"
        >
          <span
            class="absolute inset-0 bg-gradient-to-r from-yellow-400 via-yellow-600 to-yellow-400 opacity-80 group-hover:opacity-100 animate-pulse"
          ></span>
          <div
            class="relative bg-gray-900 rounded-xl px-4 py-3.5 flex items-center justify-center gap-3"
          >
            <span class="text-white font-bold tracking-wider"
              >KLAIM SEKARANG</span
            >
            <i class="fa-brands fa-whatsapp text-green-400 text-xl"></i>
          </div>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
